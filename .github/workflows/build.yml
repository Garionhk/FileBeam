name: Build apps

# Builds the macOS .app and the Windows .exe and uploads them as artifacts.
# Run it from the GitHub "Actions" tab (Run workflow) or by pushing a v* tag.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  macos:
    runs-on: macos-latest          # Apple Silicon (arm64). Use macos-13 for Intel x86_64.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-selfhosted.txt pyinstaller
      - name: Fetch cloudflared (bundled tunnel)
        run: python fileshare/packaging/fetch_cloudflared.py
      - name: Build .app
        run: pyinstaller --noconfirm --clean fileshare/packaging/fileshare.spec
      - name: Zip .app
        run: ditto -c -k --sequesterRsrc --keepParent "dist/FileShare.app" "FileShare-macOS.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: FileShare-macOS
          path: FileShare-macOS.zip

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-selfhosted.txt pyinstaller
      - name: Fetch cloudflared (bundled tunnel)
        run: python fileshare/packaging/fetch_cloudflared.py
      - name: Build .exe
        run: pyinstaller --noconfirm --clean fileshare/packaging/fileshare.spec
      - name: Zip app folder
        run: Compress-Archive -Path dist/FileShare/* -DestinationPath FileShare-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: FileShare-Windows
          path: FileShare-Windows.zip
